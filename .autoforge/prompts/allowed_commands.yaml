# Project-Specific Allowed Commands
# ==================================
# Location: {project_dir}/.autoforge/allowed_commands.yaml
#
# This file defines bash commands that the autonomous coding agent can use
# for THIS SPECIFIC PROJECT, beyond the default allowed commands.
#
# When you create a new project, AutoForge automatically creates this file
# in your project's .autoforge/ directory. You can customize it for your
# project's specific needs (iOS, Rust, Python, etc.).

version: 1

# Uncomment the commands you need for your specific project.
# By default, this file has NO commands enabled - you must explicitly add them.

commands:
  - name: psql
    description: PostgreSQL command-line client
  - name: pg_isready
    description: Check PostgreSQL connection status
  - name: test
    description: Shell test command for conditionals
  - name: which
    description: Locate a command
  - name: export
    description: Set environment variables
  - name: source
    description: Source shell scripts
  - name: tee
    description: Write to files
  - name: xargs
    description: Build and execute commands
  - name: sort
    description: Sort lines
  - name: uniq
    description: Filter unique lines
  - name: tr
    description: Translate characters
  - name: cut
    description: Remove sections from lines
  - name: dirname
    description: Strip last component from file name
  - name: basename
    description: Strip directory from file name
  - name: realpath
    description: Resolve canonical path
  - name: seq
    description: Generate sequences
  - name: date
    description: Display date and time
  - name: env
    description: Display or set environment
  - name: printenv
    description: Print environment variables
  - name: cd
    description: Change directory
  - name: tsc
    description: TypeScript compiler
  - name: python3
    description: Python 3 interpreter
  - name: "true"
    description: True command
  - name: "false"
    description: False command
  - name: make
    description: make command
  - name: find
    description: find command
  - name: pgrep
    description: pgrep command
  - name: ln
    description: ln command
  - name: print*
    description: print command
  - name: echo*
    description: echo command
  - name: nohup
    description: nohup command
  - name: xxd
    description: xxd command
  - name: ss
    description: ss command
  - name: await
    description: Playwright run-code async command
  - name: return
    description: JavaScript return statement for eval
  - name: const
    description: JavaScript const declaration
  - name: add
    description: Git add subcommand


  # ==========================================
  # iOS Development Example
  # ==========================================
  # Uncomment these if building an iOS app:

  # - name: xcodebuild
